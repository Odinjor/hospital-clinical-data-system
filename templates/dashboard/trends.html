{% extends "base.html" %}

{% block content %}
<h1>Workload Trends</h1>

<div class="table-section">
    {% if data %}
    <table class="data-table">
        <thead>
            <tr>
                <th>Department ID</th>
                <th>Visits</th>
                <th>Week</th>
            </tr>
        </thead>
        <tbody>
        {% for row in data %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No data available.</p>
    {% endif %}
</div>

<div style="margin-top: 20px;">
    <a href="/dashboard/visits" class="nav-link">← Previous: Visits</a>
    <a href="/dashboard/diagnoses" class="nav-link" style="float: right;">Next: Diagnoses →</a>
</div>

{% endblock %}
