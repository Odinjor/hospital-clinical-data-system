{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>👥 Patient Management</h1>
    <a href="/" class="btn-secondary">← Back to Dashboard</a>
</div>

<div class="tabs-container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('search')">Search Patient</button>
        <button class="tab-btn" onclick="switchTab('list')">Patient List</button>
        <button class="tab-btn" onclick="switchTab('add')">Add New Patient</button>
        <button class="tab-btn" onclick="switchTab('update')">Update Patient</button>
    </div>

    <!-- Search Patient Tab -->
    <div id="search" class="tab-content active">
        <div class="form-card">
            <h3>Search Patient by ID</h3>
            <form id="searchForm">
                <label for="searchPatientId">Patient ID:</label>
                <input type="number" id="searchPatientId" name="patient_id" required min="1">
                <button type="submit" class="btn-primary">Search</button>
            </form>
            <div id="searchResult"></div>
        </div>
    </div>

    <!-- Patient List Tab -->
    <div id="list" class="tab-content">
        <div class="table-card">
            <h3>All Patients</h3>
            <div id="patientListContainer">
                <p>Loading patients...</p>
            </div>
        </div>
    </div>

    <!-- Add New Patient Tab -->
    <div id="add" class="tab-content">
        <div class="form-card">
            <h3>Add New Patient</h3>
            <form id="addPatientForm">
                <div class="form-group">
                    <label for="dob">Date of Birth:</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                
                <div class="form-group">
                    <label for="sex">Sex:</label>
                    <select id="sex" name="sex" required>
                        <option value="">-- Select --</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="ethnicity">Ethnicity:</label>
                    <input type="text" id="ethnicity" name="ethnicity" placeholder="e.g., Caucasian, Hispanic, Asian">
                </div>
                
                <button type="submit" class="btn-primary">Add Patient</button>
            </form>
            <div id="addResult"></div>
        </div>
    </div>

    <!-- Update Patient Tab -->
    <div id="update" class="tab-content">
        <div class="form-card">
            <h3>Update Patient Information</h3>
            <form id="updatePatientForm">
                <div class="form-group">
                    <label for="updatePatientId">Patient ID:</label>
                    <input type="number" id="updatePatientId" name="patient_id" required min="1">
                </div>
                
                <div class="form-group">
                    <label for="updateSex">Sex:</label>
                    <select id="updateSex" name="sex">
                        <option value="">-- Select --</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="updateEthnicity">Ethnicity:</label>
                    <input type="text" id="updateEthnicity" name="ethnicity" placeholder="Leave blank to keep unchanged">
                </div>
                
                <button type="submit" class="btn-primary">Update Patient</button>
            </form>
            <div id="updateResult"></div>
        </div>
    </div>
</div>

<style>
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #3498db;
}

.page-header h1 {
    margin: 0;
    flex: 1;
}

.tabs-container {
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    overflow: hidden;
}

.tabs {
    display: flex;
    background-color: #ecf0f1;
    border-bottom: 2px solid #bdc3c7;
    flex-wrap: wrap;
}

.tab-btn {
    flex: 1;
    min-width: 120px;
    padding: 15px 20px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.95em;
    font-weight: 500;
    color: #34495e;
    transition: all 0.3s;
    border-bottom: 3px solid transparent;
}

.tab-btn:hover {
    background-color: #bdc3c7;
    color: #2c3e50;
}

.tab-btn.active {
    background-color: #3498db;
    color: white;
    border-bottom-color: #2980b9;
}

.tab-content {
    display: none;
    padding: 30px;
    animation: fadeIn 0.3s;
}

.tab-content.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.form-card, .table-card {
    background: #f9f9f9;
    padding: 20px;
    border-radius: 5px;
    border-left: 4px solid #3498db;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 5px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    border: 1px solid #bdc3c7;
    border-radius: 3px;
    font-size: 1em;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
}

.data-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

.data-table thead {
    background-color: #34495e;
    color: white;
}

.data-table th {
    padding: 12px;
    text-align: left;
    font-weight: 600;
}

.data-table td {
    padding: 12px;
    border-bottom: 1px solid #ecf0f1;
}

.data-table tbody tr:hover {
    background-color: #f0f0f0;
}

.btn-small {
    padding: 6px 12px;
    margin: 2px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.85em;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
}

.btn-edit {
    background-color: #3498db;
    color: white;
}

.btn-edit:hover {
    background-color: #2980b9;
}

.btn-delete {
    background-color: #e74c3c;
    color: white;
}

.btn-delete:hover {
    background-color: #c0392b;
}

.btn-report {
    background-color: #2ecc71;
    color: white;
}

.btn-report:hover {
    background-color: #27ae60;
}

.result-message {
    margin-top: 15px;
    padding: 15px;
    border-radius: 5px;
    display: none;
}

.result-message.success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
    display: block;
}

.result-message.error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    display: block;
}

.patient-detail {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 5px;
    border-left: 4px solid #2ecc71;
}

.patient-detail p {
    margin: 8px 0;
}

.patient-detail strong {
    color: #2c3e50;
}
</style>

<script>
function switchTab(tabName) {
    // Hide all tabs
    const contents = document.querySelectorAll('.tab-content');
    contents.forEach(content => content.classList.remove('active'));
    
    // Remove active class from all buttons
    const btns = document.querySelectorAll('.tab-btn');
    btns.forEach(btn => btn.classList.remove('active'));
    
    // Show selected tab
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
    
    // Load data if needed
    if (tabName === 'list') {
        loadPatientList();
    }
}

// Search Patient
document.getElementById('searchForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const patientId = document.getElementById('searchPatientId').value;
    
    fetch(`/api/patients/${patientId}`)
        .then(response => response.json())
        .then(data => {
            const resultDiv = document.getElementById('searchResult');
            if (data.error) {
                resultDiv.innerHTML = `<div class="result-message error">${data.error}</div>`;
            } else {
                resultDiv.innerHTML = `
                    <div class="patient-detail">
                        <h4>Patient Found</h4>
                        <p><strong>Patient ID:</strong> ${data[0] || 'N/A'}</p>
                        <p><strong>Date of Birth:</strong> ${data[1] || 'N/A'}</p>
                        <p><strong>Sex:</strong> ${data[2] || 'N/A'}</p>
                        <p><strong>Ethnicity:</strong> ${data[3] || 'N/A'}</p>
                        <div style="margin-top: 15px;">
                            <a href="/api/patients/${patientId}/report" class="btn-small btn-report" target="_blank">View Report</a>
                        </div>
                    </div>
                `;
            }
        })
        .catch(error => {
            document.getElementById('searchResult').innerHTML = `<div class="result-message error">Error: ${error.message}</div>`;
        });
});

// Load Patient List
function loadPatientList() {
    fetch('/api/patients')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('patientListContainer');
            if (!data || data.length === 0 || data.error) {
                container.innerHTML = '<p>No patients found.</p>';
                return;
            }
            
            let html = `<table class="data-table"><thead><tr>
                <th>Patient ID</th>
                <th>Date of Birth</th>
                <th>Sex</th>
                <th>Ethnicity</th>
                <th>Actions</th>
            </tr></thead><tbody>`;
            
            data.forEach(patient => {
                html += `<tr>
                    <td>${patient[0]}</td>
                    <td>${patient[1]}</td>
                    <td>${patient[2]}</td>
                    <td>${patient[3]}</td>
                    <td>
                        <button class="btn-small btn-edit" onclick="switchToUpdate(${patient[0]})">Edit</button>
                        <a href="/api/patients/${patient[0]}/report" class="btn-small btn-report" target="_blank">Report</a>
                        <button class="btn-small btn-delete" onclick="deletePatient(${patient[0]})">Delete</button>
                    </td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        })
        .catch(error => {
            document.getElementById('patientListContainer').innerHTML = `<div class="result-message error">Error loading patients: ${error.message}</div>`;
        });
}

// Add Patient
document.getElementById('addPatientForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    
    fetch('/api/patients', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams(formData)
    })
    .then(response => response.json())
    .then(data => {
        const resultDiv = document.getElementById('addResult');
        if (data.error) {
            resultDiv.innerHTML = `<div class="result-message error">${data.error}</div>`;
        } else {
            resultDiv.innerHTML = `<div class="result-message success">✓ Patient added successfully! ID: ${data.patient_id}</div>`;
            document.getElementById('addPatientForm').reset();
        }
    })
    .catch(error => {
        document.getElementById('addResult').innerHTML = `<div class="result-message error">Error: ${error.message}</div>`;
    });
});

// Update Patient
document.getElementById('updatePatientForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const patientId = document.getElementById('updatePatientId').value;
    const formData = new FormData(this);
    
    fetch(`/api/patients/${patientId}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams(formData)
    })
    .then(response => response.json())
    .then(data => {
        const resultDiv = document.getElementById('updateResult');
        if (data.error) {
            resultDiv.innerHTML = `<div class="result-message error">${data.error}</div>`;
        } else {
            resultDiv.innerHTML = `<div class="result-message success">✓ Patient updated successfully!</div>`;
        }
    })
    .catch(error => {
        document.getElementById('updateResult').innerHTML = `<div class="result-message error">Error: ${error.message}</div>`;
    });
});

// Delete Patient
function deletePatient(patientId) {
    if (!confirm('Are you sure you want to delete this patient?')) return;
    
    fetch(`/api/patients/${patientId}`, { method: 'DELETE' })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert('Error: ' + data.error);
            } else {
                alert('Patient deleted successfully');
                loadPatientList();
            }
        })
        .catch(error => alert('Error: ' + error.message));
}

function switchToUpdate(patientId) {
    document.getElementById('updatePatientId').value = patientId;
    const btns = document.querySelectorAll('.tab-btn');
    btns.forEach(btn => btn.classList.remove('active'));
    btns[3].classList.add('active'); // Update tab
    document.getElementById('list').classList.remove('active');
    document.getElementById('update').classList.add('active');
}

// Load patient list on page load
window.addEventListener('load', function() {
    loadPatientList();
});
</script>

{% endblock %}
