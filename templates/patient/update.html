{% extends "base.html" %}

{% block content %}
<h1>Update Patient</h1>

<div class="form-container">
    <div class="form-section">
        <h3>Edit Patient ID: {{ patient[0] }}</h3>
        <form method="POST" action="/patients/update/{{ patient[0] }}" class="patient-form">
            <label>Date of Birth:</label>
            <input type="date" name="dob" value="{{ patient[1] }}">
            
            <label>Sex:</label>
            <select name="sex">
                <option value="">-- Leave unchanged --</option>
                <option value="M" {% if patient[2] == 'M' %}selected{% endif %}>Male</option>
                <option value="F" {% if patient[2] == 'F' %}selected{% endif %}>Female</option>
                <option value="O" {% if patient[2] == 'O' %}selected{% endif %}>Other</option>
            </select>
            
            <label>Ethnicity:</label>
            <input type="text" name="ethnicity" value="{{ patient[3] }}">
            
            <button type="submit" class="btn-primary">Update Patient</button>
            <a href="/patients" class="btn-secondary">Cancel</a>
        </form>
    </div>
</div>

<style>
.form-container {
    max-width: 500px;
    margin: 30px auto;
}

.btn-secondary {
    background-color: #95a5a6;
    color: white;
    padding: 10px 20px;
    border-radius: 3px;
    text-decoration: none;
    display: inline-block;
    margin-top: 10px;
    transition: background-color 0.3s;
}

.btn-secondary:hover {
    background-color: #7f8c8d;
}
</style>

{% endblock %}
